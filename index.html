<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translator — Qwen2-0.5B</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #f8fafc;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 28px;
    }

    .status-bar {
      background: #0f172a;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 0.85rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #334155;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-wrap {
      flex: 1;
    }

    .progress-track {
      height: 4px;
      background: #1e293b;
      border-radius: 4px;
      margin-top: 6px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #6366f1;
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .lang-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    select {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus { border-color: #6366f1; }

    .arrow {
      display: flex;
      align-items: center;
      color: #475569;
      font-size: 1.2rem;
    }

    textarea {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 14px;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 110px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
      line-height: 1.5;
    }

    textarea:focus { border-color: #6366f1; }
    textarea[readonly] { color: #94a3b8; cursor: default; }

    .textarea-label {
      font-size: 0.75rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      margin-top: 16px;
    }

    button.translate {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button.translate:hover:not(:disabled) { background: #4f46e5; }
    button.translate:disabled { opacity: 0.45; cursor: not-allowed; }

    .examples-label {
      font-size: 0.75rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 24px;
      margin-bottom: 8px;
    }

    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .example-btn {
      background: #0f172a;
      border: 1px solid #334155;
      color: #94a3b8;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .example-btn:hover { border-color: #6366f1; color: #c7d2fe; }

    .ready-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Language Translator</h1>
    <p class="subtitle">Powered by Qwen2-0.5B &mdash; runs entirely in your browser, no API keys needed</p>

    <div class="status-bar" id="statusBar">
      <div class="spinner" id="spinner"></div>
      <div class="progress-wrap">
        <span id="statusText">Loading model, please wait…</span>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <div class="lang-row">
      <select id="srcLang">
        <option value="English">English</option>
        <option value="Spanish">Spanish</option>
        <option value="Portuguese">Portuguese</option>
        <option value="French">French</option>
        <option value="German">German</option>
      </select>
      <div class="arrow">→</div>
      <select id="tgtLang">
        <option value="Spanish">Spanish</option>
        <option value="Portuguese">Portuguese</option>
        <option value="English">English</option>
        <option value="French">French</option>
        <option value="German">German</option>
      </select>
    </div>

    <div class="textarea-label">Text to translate</div>
    <textarea id="inputText" placeholder="Enter text here…"></textarea>

    <button class="translate" id="translateBtn" disabled>Translate</button>

    <div class="textarea-label">Translation</div>
    <textarea id="outputText" readonly placeholder="Translation will appear here…"></textarea>

    <div class="examples-label">Examples</div>
    <div class="examples">
      <button class="example-btn" onclick="setExample('I like soccer')">I like soccer</button>
      <button class="example-btn" onclick="setExample('How are you?')">How are you?</button>
      <button class="example-btn" onclick="setExample('What time is it?')">What time is it?</button>
    </div>
  </div>

  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3';

    const MODEL = 'onnx-community/Qwen2-0.5B-Instruct';

    const statusText  = document.getElementById('statusText');
    const progressFill = document.getElementById('progressFill');
    const spinner     = document.getElementById('spinner');
    const translateBtn = document.getElementById('translateBtn');
    const statusBar   = document.getElementById('statusBar');

    let generator = null;

    function setReady() {
      spinner.style.display = 'none';
      statusBar.innerHTML = '<div class="ready-dot"></div><span>Model ready — translate away!</span>';
      translateBtn.disabled = false;
    }

    function setError(msg) {
      spinner.style.display = 'none';
      statusText.textContent = '⚠ ' + msg;
    }

    async function loadModel() {
      try {
        generator = await pipeline('text-generation', MODEL, {
          dtype: 'q4',
          progress_callback: ({ status, progress, file }) => {
            if (status === 'progress' && progress != null) {
              const pct = Math.round(progress);
              progressFill.style.width = pct + '%';
              statusText.textContent = `Downloading model… ${pct}% (${file ?? ''})`;
            }
          },
        });
        setReady();
      } catch (e) {
        setError('Failed to load model: ' + e.message);
      }
    }

    async function translate() {
      const text = document.getElementById('inputText').value.trim();
      if (!text || !generator) return;

      const src = document.getElementById('srcLang').value;
      const tgt = document.getElementById('tgtLang').value;
      const output = document.getElementById('outputText');

      translateBtn.disabled = true;
      translateBtn.textContent = 'Translating…';
      output.value = '';

      try {
        const messages = [
          {
            role: 'user',
            content: `Translate the following ${src} text to ${tgt}. Reply with ONLY the translation, no explanations.\n\nText: ${text}`,
          },
        ];

        const result = await generator(messages, { max_new_tokens: 150, do_sample: false });
        output.value = result[0].generated_text.at(-1).content.trim();
      } catch (e) {
        output.value = 'Error: ' + e.message;
      } finally {
        translateBtn.disabled = false;
        translateBtn.textContent = 'Translate';
      }
    }

    document.getElementById('translateBtn').addEventListener('click', translate);

    window.setExample = function(text) {
      document.getElementById('inputText').value = text;
    };

    loadModel();
  </script>
</body>
</html>
